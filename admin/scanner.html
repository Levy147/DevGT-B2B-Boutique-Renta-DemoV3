<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scanner QR - Panel Admin | Mujer Bonita GT</title>
  <link rel="stylesheet" href="../public/css/main.css">
  <link rel="stylesheet" href="../public/css/admin.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✦</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&family=Playfair+Display:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="../public/js/theme.js"></script>
</head>
<body class="admin-light">
  <nav class="navbar" id="navbar">
    <div class="navbar-inner">
      <a href="../index.html" class="navbar-logo"><span>✦ Mujer Bonita GT</span></a>
      <div style="font-size:0.85rem;color:var(--text-muted);">Panel de Administración</div>
      <div class="navbar-actions">
        <button class="btn btn-outline btn-sm" onclick="handleLogout()">⤻ Salir</button>
      </div>
    </div>
  </nav>

  <main class="main-content">
    <div class="admin-layout">
      <aside class="admin-sidebar">
        <div class="sidebar-logo">Admin</div>
        <a href="dashboard.html"><img src="../public/img/Iconos/Grafica.png" class="sidebar-icon-img" alt=""><span>Dashboard</span></a>
        <a href="inventario.html"><img src="../public/img/Iconos/Inventario.png" class="sidebar-icon-img" alt=""><span>Inventario</span></a>
        <a href="usuarios.html"><img src="../public/img/Iconos/Usuarios.png" class="sidebar-icon-img" alt=""><span>Usuarios</span></a>
        <a href="scanner.html" class="active"><img src="../public/img/Iconos/Etiquetas.png" class="sidebar-icon-img" alt=""><span>Scanner QR</span></a>
        <a href="../catalogo.html"><span>Ver Tienda</span></a>
      </aside>

      <section class="admin-main">
        <h1><img src="../public/img/Iconos/Etiquetas.png" class="heading-icon-img" alt="">Escáner de Código QR</h1>
        <p class="page-desc">Escanea el código QR de un vestido para ver su información y gestionar su estado</p>

        <div class="scanner-container">
          <div class="scanner-viewport" id="scannerViewport">
            <div class="scanner-overlay"></div>
            <div class="scanner-placeholder" id="scannerPlaceholder">
              <img src="../public/img/Iconos/Etiquetas.png" style="width:48px;height:48px;object-fit:contain;mix-blend-mode:multiply;margin-bottom:16px;" alt="">
              <p>La cámara se iniciará automáticamente</p>
            </div>
          </div>

          <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
            <button class="btn btn-primary" onclick="iniciarEscanner()">Iniciar Cámara</button>
            <button class="btn btn-secondary" onclick="detenerEscanner()">⊟ Detener</button>
            <button class="btn btn-outline" onclick="entrarIdManual()"># Ingresar ID Manual</button>
          </div>

          <div class="scanner-result" id="scannerResult" style="display:none;">
            <div id="scannerResultContent"></div>
          </div>

          <div id="scannerError" style="display:none;margin-top:16px;padding:16px;background:#fce4ec;border-radius:12px;color:var(--danger);text-align:center;">
            <p id="scannerErrorMessage"></p>
          </div>
        </div>
      </section>
    </div>
  </main>

  <div class="toast-container" id="toastContainer"></div>

  <script src="../public/js/data.js"></script>
  <script src="../public/js/image-config.js"></script>
  <script src="../public/js/carrito.js"></script>
  <script src="../public/js/admin.js"></script>
  <script src="../public/js/qr-scanner.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      /* COMENTAMOS LA SEGURIDAD PARA PODER ENTRAR
      const user = getCurrentUser();
      if (!user || user.correo !== 'admin@boutique.com') {
        window.location.href = '../index.html';
        return;
      }
      */
    });
  </script>
  
</body>
</html>
